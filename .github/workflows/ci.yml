name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true  # lint is advisory until Phase 0 lands actual code

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: true  # typecheck is advisory until Phase 0 lands actual code

      - name: Test
        run: pnpm test
        continue-on-error: true  # tests are advisory until Phase 0 lands actual code
